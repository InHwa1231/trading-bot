# Fly.io 설정 파일
app = "trading-bot-v56plus"

# 기본 설정
kill_timeout = 30
kill_signal = "SIGINT"

[build]
dockerfile = "Dockerfile"

[env]
# Fly.io 환경에서만 실행되도록
PYTHONUNBUFFERED = "1"

[processes]
# worker: 24/7 백그라운드 프로세스 (트래픽 필요 없음)
worker = "python run_paper_trade.py"

[[services]]
internal_port = 8080
protocol = "tcp"

# Health check (선택사항 - 프로세스 상태 모니터링)
[checks]
"worker" = {
  type = "exec"
  interval = "30s"
  timeout = "5s"
  cmd = "test -f logs/paper_trade_*.log"
}

[[vm]]
# 메모리: 512MB (충분함)
memory = "512mb"
cpu_kind = "shared"
cpus = 1

[deploy]
# 자동 재시작 설정
strategy = "rolling"
