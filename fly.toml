# Fly.io 설정 파일
app = "trading-bot-inhwal2312"

# 기본 설정
kill_timeout = 30
kill_signal = "SIGINT"

[build]
dockerfile = "Dockerfile"

[env]
# Fly.io 환경에서만 실행되도록
PYTHONUNBUFFERED = "1"

[processes]
# worker: 24/7 백그라운드 프로세스 (트래픽 필요 없음)
worker = "python run_paper_trade.py"

# 머신 스케일: 항상 1개 유지 (24/7 실행)
[scale]
count = 1

[[vm]]
# 메모리: 512MB (충분함)
memory = "512mb"
cpu_kind = "shared"
cpus = 1
